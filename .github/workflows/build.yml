name: Build CITFabric
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - run: chmod +x gradlew
      - name: Build
        run: |
          rm -rf ~/.gradle
          ./gradlew --info build 2>&1 | head -300
      - uses: actions/upload-artifact@v4
        with:
          name: citfabric-jar
          path: build/libs/*.jar
