name: Build CITFabric
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: "21", distribution: "temurin"}
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew --no-build-cache build
      - run: ls -lh build/libs/
      - name: Release v4.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v dev | head -1)
          gh release delete v4.0.0 --yes 2>/dev/null || true
          gh release create v4.0.0 "$JAR#CITFabric-4.0.0.jar" \
            --title "CITFabric v4.0.0 - Debug logging + robust rendering" \
            --notes "Full debug logging. Check .minecraft/logs/latest.log for [CITFabric] lines."
