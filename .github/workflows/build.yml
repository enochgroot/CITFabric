name: Build CITFabric
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      - name: Clear Loom cache
        run: rm -rf ~/.gradle/caches/fabric-loom* ~/.gradle/caches/com.mojang
      - name: Build
        run: ./gradlew --no-build-cache build
      - uses: actions/upload-artifact@v4
        with:
          name: citfabric-1.0.0-MC1.21.11
          path: build/libs/citfabric-1.0.0.jar
