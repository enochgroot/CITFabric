name: Build CITFabric
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {java-version: "21", distribution: "temurin"}
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew --no-build-cache build
      - run: ls -lh build/libs/
      - name: Create release v3.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JAR=$(ls build/libs/*.jar | grep -v sources | grep -v dev | head -1)
          echo "Uploading $JAR"
          gh release delete v3.0.0 --yes 2>/dev/null || true
          gh release create v3.0.0 "$JAR#citfabric-3.0.0.jar" \
            --title "CITFabric v3.0.0 - Mixin fix + robust name matching" \
            --notes "Fixed mixin injection reliability and name matching. Works with OptiFine CIT resource packs."
