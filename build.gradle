plugins { id 'fabric-loom' version '1.7-SNAPSHOT' }
// version is read from gradle.properties
group = 'com.citfabric'
base { archivesName = 'CITFabric' }
repositories {
    maven { name = 'Fabric'; url = 'https://maven.fabricmc.net/' }
    mavenCentral()
}
dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings loom.officialMojangMappings()
    modImplementation "net.fabricmc:fabric-loader:0.18.2"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.3+1.21.11"
}
java { sourceCompatibility = JavaVersion.VERSION_21; targetCompatibility = JavaVersion.VERSION_21 }
tasks.withType(JavaCompile).configureEach { it.options.release = 21 }
jar { from('LICENSE') { duplicatesStrategy = DuplicatesStrategy.EXCLUDE } }
